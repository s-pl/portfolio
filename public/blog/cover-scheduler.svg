<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#0f0f0f"/>
  <pattern id="dots2" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#34d399" opacity="0.08"/>
  </pattern>
  <rect width="800" height="420" fill="url(#dots2)"/>

  <!-- timeline baseline -->
  <line x1="80" y1="210" x2="720" y2="210" stroke="#34d399" stroke-width="1" opacity="0.2"/>

  <!-- tick marks -->
  <line x1="160" y1="200" x2="160" y2="220" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="200" x2="280" y2="220" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="200" x2="400" y2="220" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <line x1="520" y1="200" x2="520" y2="220" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <line x1="640" y1="200" x2="640" y2="220" stroke="#34d399" stroke-width="1" opacity="0.3"/>

  <!-- scheduled events — vertical drops -->
  <line x1="160" y1="130" x2="160" y2="210" stroke="#34d399" stroke-width="1" opacity="0.4" stroke-dasharray="4 3"/>
  <line x1="400" y1="100" x2="400" y2="210" stroke="#34d399" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 3"/>
  <line x1="640" y1="130" x2="640" y2="210" stroke="#34d399" stroke-width="1" opacity="0.4" stroke-dasharray="4 3"/>

  <!-- event dots on timeline -->
  <circle cx="160" cy="210" r="5" fill="#34d399" opacity="0.6"/>
  <circle cx="400" cy="210" r="7" fill="#34d399" opacity="0.9"/>
  <circle cx="640" cy="210" r="5" fill="#34d399" opacity="0.6"/>

  <!-- event labels above -->
  <rect x="130" y="108" width="60" height="22" rx="3" fill="#0f0f0f" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <text x="160" y="123" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9" opacity="0.7">nextTick()</text>

  <rect x="360" y="78" width="80" height="22" rx="3" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-width="1" opacity="0.8"/>
  <text x="400" y="93" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9" opacity="0.9">now + delay</text>

  <rect x="610" y="108" width="60" height="22" rx="3" fill="#0f0f0f" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <text x="640" y="123" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9" opacity="0.7">nextTick()</text>

  <!-- zero drift label -->
  <line x1="160" y1="270" x2="400" y2="270" stroke="#34d399" stroke-width="1" opacity="0.25"/>
  <line x1="160" y1="265" x2="160" y2="275" stroke="#34d399" stroke-width="1" opacity="0.25"/>
  <line x1="400" y1="265" x2="400" y2="275" stroke="#34d399" stroke-width="1" opacity="0.25"/>
  <text x="280" y="290" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10" opacity="0.45">Δt exacto</text>

  <text x="400" y="370" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="12" opacity="0.5">drift: 0ms</text>
</svg>
